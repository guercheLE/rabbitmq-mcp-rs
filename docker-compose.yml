services:
  rabbitmq-mcp:
    build: .
    image: rabbitmq-mcp:latest
    command: ["start"]
    env_file:
      - .env
    volumes:
      - ~/.rabbitmq-mcp:/root/.rabbitmq-mcp
    stdin_open: true
    tty: true

  rabbitmq-mcp-http:
    build: .
    image: rabbitmq-mcp:latest
    command: ["http", "--host", "0.0.0.0", "--port", "3000"]
    env_file:
      - .env
    environment:
      RABBITMQ_MCP_TRANSPORT: http
      RABBITMQ_MCP_PORT: "3000"
    ports:
      - "3000:3000"
    volumes:
      - ~/.rabbitmq-mcp:/root/.rabbitmq-mcp
