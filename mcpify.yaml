language: rust
output: .
force: true
publish_registry: true
publication:
  license: MIT
  repository: https://github.com/guercheLE/rabbitmq-mcp-rs
  readme: README.md
  authors:
  - Luciano Evaristo Guerche (Gorše)
  keywords:
  - mcp
  - rabbitmq
  - cli
  - api
  categories:
  - command-line-utilities
  - api-bindings
  exclude:
  - /.github
  - /.mcpify
  - /docs
  - /scripts
  - /openapi
  - /Dockerfile
  - /docker-compose.yml
  - /.dockerignore
  - /.env.example
  - /mcpify.yaml
default_headers: {}
auth: []
versions:
- version: 4.3.2
  source: openapi/rabbitmq-management-v4.3.2.openapi.yaml
  default: true
  preprocess: []
- version: 4.2.8
  source: openapi/rabbitmq-management-v4.2.8.openapi.yaml
  default: false
  preprocess: []
- version: 4.1.8
  source: openapi/rabbitmq-management-v4.1.8.openapi.yaml
  default: false
  preprocess: []
- version: 4.0.9
  source: openapi/rabbitmq-management-v4.0.9.openapi.yaml
  default: false
  preprocess: []
- version: 3.13.7
  source: openapi/rabbitmq-management-v3.13.7.openapi.yaml
  default: false
  preprocess: []
version_policy:
  mode: all
package_size_limit_mb: 100
