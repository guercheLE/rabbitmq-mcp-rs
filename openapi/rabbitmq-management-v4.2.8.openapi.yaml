      "summary": "The server definitions: exchanges, queues, bindings, users, virtual hosts, permissions, topic permissions, and parameters."
      "description": "The server definitions: exchanges, queues, bindings, users, virtual hosts, permissions, topic permissions, and parameters. Everything apart from messages. POST to upload an existing set of definitions. Note that: The definitions are merged. Anything already existing on the server but not in the uploaded definitions is untouched. Conflicting definitions on immutable objects (exchanges, queues and bindings) will be ignored. The existing definition will be preserved. Conflicting definitions on mutable objects will cause the object in the server to be overwritten with the object from the definitions. In the event of an error you will be left with a part-applied set of definitions. This endpoint supports multipart/form-data as well as the standard application/json content types for uploads. In the former case, the definitions file should be uploaded as a form field named \"file\". Relevant documentation guide: Definition Export and Import"
      "operationId": "getApiDefinitions"
      "responses":
