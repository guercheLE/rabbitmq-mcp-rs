            "schema":
              "type": "object"
              "properties":
                "count":
                  "oneOf":
                    -
                      "type": "integer"
                    -
                      "type": "string"
                "ackmode":
                  "type": "string"
                "encoding":
                  "type": "string"
                "truncate":
                  "oneOf":
                    -
                      "type": "integer"
                    -
                      "type": "string"
                "vhost":
                  "type": "string"
                "name":
                  "type": "string"
              "required":
                - "count"
