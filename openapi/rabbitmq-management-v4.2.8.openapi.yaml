      "summary": "Get messages from a queue."
      "description": "Get messages from a queue. (This is not an HTTP GET as it will alter the state of the queue.) You should post a body looking like: {\"count\":5,\"ackmode\":\"ack_requeue_true\",\"encoding\":\"auto\",\"truncate\":50000} count controls the maximum number of messages to get. You may get fewer messages than this if the queue cannot immediately provide them. ackmode determines whether the messages will be removed from the queue. If ackmode is ack_requeue_true or reject_requeue_true they will be requeued - if ackmode is ack_requeue_false or reject_requeue_false they will be removed. encoding must be either \"auto\" (in which case the payload will be returned as a string if it is valid UTF-8, and base64 encoded otherwise), or \"base64\" (in which case the payload will always be base64 encoded). If truncate is present it will truncate the message payload if it is larger than the size given (in bytes). truncate is optional; all other keys are mandatory. Please note that the get path in the HTTP API is intended for diagnostics etc - it does not implement reliable delivery and so should be treated as a sysadmin's tool rather than a general API for messaging."
      "operationId": "postApiQueuesVhostNameGet"
      "parameters":
        -
          "name": "vhost"
          "in": "path"
          "required": true
          "schema":
            "type": "string"
        -
          "name": "name"
          "in": "path"
          "required": true
          "schema":
            "type": "string"
        -
          "name": "x-vhost"
          "in": "header"
          "required": false
          "schema":
            "type": "string"
