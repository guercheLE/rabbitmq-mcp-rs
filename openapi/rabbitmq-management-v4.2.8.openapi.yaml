  "/api/health/checks/certificate-expiration/{within}/{unit}":
    "get":
      "tags":
        - "health"
      "summary": "Checks the expiration date of every certificate found in the PEM certificate bundles used by all TLS-enabled listeners on the node, regar..."
      "description": "Checks the expiration date of every certificate found in the PEM certificate bundles used by all TLS-enabled listeners on the node, regardless of the \"type\" of the certificate (leaf/server identity, intermediary or any CA). Responds a 200 OK if all certificates are valid (have not expired), otherwise responds with a 503 Service Unavailable. This health assumes that All certificates included in the PEM bundles on the nodes are relevant to RabbitMQ clients, plugins or encrypted inter-node communication Expired certificates is not a normal operating condition and any expired certificate found must be reported with a check failure Do not use this health check if some of these assumptions are not true. Valid units: days, weeks, months, years. The value of the within argument is the number of units. So, when within is 2 and unit is \"months\", the expiration period used by the check will be the next two months. Relevant documentation guides: TLS, Encrypted Inter-node Communication"
      "operationId": "getApiHealthChecksCertificateExpirationWithinUnit"
      "parameters":
        -
          "name": "within"
          "in": "path"
          "required": true
          "schema":
            "type": "string"
        -
          "name": "unit"
          "in": "path"
          "required": true
          "schema":
            "type": "string"
      "responses":
        "2XX":
          "description": "Successful response."
        "4XX":
          "description": "Client error."
        "5XX":
          "description": "RabbitMQ server error."
